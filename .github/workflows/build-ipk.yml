name: build-ipk

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '.github/workflows/build-ipk.yml'
      - '.gitignore'
      - 'README.md'
      - 'scripts/**'
      - 'jludrcom/**'
  pull_request:
    paths:
      - '.github/workflows/build-ipk.yml'
      - '.gitignore'
      - 'README.md'
      - 'scripts/**'
      - 'jludrcom/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-ipk-${{ github.ref }}
  cancel-in-progress: true

env:
  PACKAGE_NAME: jludrcom
  OPENWRT_RELEASE: 24.10.5

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate helper scripts
        run: |
          python3 -m py_compile scripts/generate-openwrt-sdk-matrix.py
          bash -n scripts/build-openwrt-sdk-ipk.sh

      - name: Validate LuCI controller syntax
        run: npx --yes luaparse jludrcom/files/usr/lib/lua/luci/controller/jludrcom.lua > /dev/null

      - name: Validate LuCI inline script syntax
        run: |
          python3 - <<'PY'
          from pathlib import Path
          html = Path('jludrcom/files/usr/lib/lua/luci/view/jludrcom/form.htm').read_text(encoding='utf-8')
          marker = '<script type="text/javascript">'
          start = html.index(marker) + len(marker)
          end = html.index('</script>', start)
          Path('.tmp-luci-form.js').write_text(html[start:end], encoding='utf-8', newline='\n')
          PY
          node --check .tmp-luci-form.js

      - name: Run parser smoke test
        run: make -C jludrcom/src test-parser

  plan:
    name: plan-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate target matrix
        id: matrix
        run: |
          python3 scripts/generate-openwrt-sdk-matrix.py --release "${OPENWRT_RELEASE}" > matrix.json
          cat matrix.json
          {
            echo 'matrix<<EOF'
            cat matrix.json
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.pkgarch }}
    needs:
      - verify
      - plan
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build package
        run: |
          bash scripts/build-openwrt-sdk-ipk.sh \
            --package-root "${GITHUB_WORKSPACE}/jludrcom" \
            --release "${OPENWRT_RELEASE}" \
            --target "${{ matrix.target }}" \
            --subtarget "${{ matrix.subtarget }}" \
            --pkgarch "${{ matrix.pkgarch }}" \
            --output-dir "${GITHUB_WORKSPACE}/dist/${{ matrix.pkgarch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ matrix.pkgarch }}
          path: dist/${{ matrix.pkgarch }}
          if-no-files-found: error
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: jludrcom-*
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          notes="$(cat <<EOF
          Automated OpenWrt package release for ${GITHUB_REF_NAME}

          - OpenWrt release: ${OPENWRT_RELEASE}
          - Package: ${PACKAGE_NAME}
          - Build route: official SDK toolchain + scripts/ipkg-build
          - Assets: one .ipk and one .sha256 per pkgarch
          EOF
          )"

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "${notes}"
          else
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "${notes}"
          fi

          mapfile -t assets < <(find dist -type f \( -name '*.ipk' -o -name '*.sha256' \) | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo 'No release assets found.' >&2
            exit 1
          fi

          gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
