name: build-ipk

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '.github/workflows/build-ipk.yml'
      - 'jludrcom/**'
      - 'README.md'
  pull_request:
    paths:
      - '.github/workflows/build-ipk.yml'
      - 'jludrcom/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read

env:
  PACKAGE_NAME: jludrcom
  OPENWRT_RELEASE: 24.10.5

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Validate LuCI controller syntax
        run: npx --yes luaparse jludrcom/files/usr/lib/lua/luci/controller/jludrcom.lua > /dev/null

      - name: Validate LuCI inline script syntax
        run: |
          python - <<'PY'
          from pathlib import Path
          html = Path('jludrcom/files/usr/lib/lua/luci/view/jludrcom/form.htm').read_text(encoding='utf-8')
          marker = '<script type="text/javascript">'
          start = html.index(marker) + len(marker)
          end = html.index('</script>', start)
          Path('.tmp-luci-form.js').write_text(html[start:end], encoding='utf-8', newline='\n')
          PY
          node --check .tmp-luci-form.js

      - name: Run parser smoke test
        run: make -C jludrcom/src test-parser

  build:
    name: ${{ matrix.pkgarch }}
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        pkgarch:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_generic
          - arm_arm1176jzf-s_vfp
          - arm_cortex-a15_neon-vfpv4
          - arm_cortex-a5_vfpv4
          - arm_cortex-a7
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a8_vfpv3
          - arm_cortex-a9
          - arm_cortex-a9_neon
          - arm_cortex-a9_vfpv3-d16
          - arm_fa526
          - arm_xscale
          - i386_pentium4
          - loongarch64_generic
          - mips64_octeonplus
          - mips64el_mips64r2
          - mips_24kc
          - mips_mips32
          - mipsel_24kc
          - mipsel_mips32
          - powerpc_464fp
          - powerpc64_e5500
          - riscv64_riscv64
          - x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Build package
        uses: openwrt/gh-action-sdk@0c00b28c11bed5c7697e807d4cb8ef176ca688ef
        env:
          ARCH: ${{ matrix.pkgarch }}-${{ env.OPENWRT_RELEASE }}
          PACKAGES: ${{ env.PACKAGE_NAME }}
          NO_REFRESH_CHECK: true
          V: s

      - name: Collect build outputs
        shell: bash
        run: |
          set -eux
          mkdir -p dist/${{ matrix.pkgarch }}
          find bin/packages -type f \( -name '*.ipk' -o -name 'Packages' -o -name 'Packages.gz' -o -name 'Packages.manifest' \) -exec cp --parents {} dist/${{ matrix.pkgarch }}/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ matrix.pkgarch }}-openwrt-${{ env.OPENWRT_RELEASE }}
          path: dist/${{ matrix.pkgarch }}
          if-no-files-found: error
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist
          pattern: jludrcom-*-openwrt-*

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mapfile -t ipk_files < <(find dist -type f -name '*.ipk' | sort)
          if [ "${#ipk_files[@]}" -eq 0 ]; then
            echo 'No ipk files found to publish.' >&2
            exit 1
          fi

          bundle_path="dist/${PACKAGE_NAME}-openwrt-${OPENWRT_RELEASE}-all-arches.tar.gz"
          tar -czf "$bundle_path" "${ipk_files[@]}"
          bundle_name="$(basename "$bundle_path")"
          bundle_sha256="$(sha256sum "$bundle_path" | awk '{print $1}')"

          api_get() {
            local url="$1"
            curl \
              --silent \
              --show-error \
              --fail \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "$url"
          }

          api_json() {
            local method="$1"
            local url="$2"
            local data="$3"
            curl \
              --silent \
              --show-error \
              --fail-with-body \
              -X "$method" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              -H 'Content-Type: application/json' \
              --data "$data" \
              "$url"
          }

          upload_asset_once() {
            local file="$1"
            local upload_url="$2"
            curl \
              --silent \
              --show-error \
              --fail-with-body \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H 'Content-Type: application/gzip' \
              --data-binary @"$file" \
              "${upload_url}?name=${bundle_name}"
          }

          release_api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases"
          release_tag_url="${release_api_url}/tags/${GITHUB_REF_NAME}"

          release_body="$(cat <<EOF
          Automated OpenWrt package bundle for ${GITHUB_REF_NAME}

          - Tag: ${GITHUB_REF_NAME}
          - Commit: ${GITHUB_SHA}
          - Bundle: ${bundle_name}
          - SHA256: ${bundle_sha256}

          The attached archive contains every generated .ipk for the supported OpenWrt targets in this workflow run.
          EOF
          )"

          create_payload="$(RELEASE_TAG="${GITHUB_REF_NAME}" RELEASE_NAME="${GITHUB_REF_NAME}" RELEASE_BODY="${release_body}" python - <<'PY'
          import json
          import os

          print(json.dumps({
              'tag_name': os.environ['RELEASE_TAG'],
              'name': os.environ['RELEASE_NAME'],
              'body': os.environ['RELEASE_BODY'],
              'draft': False,
              'prerelease': False,
          }))
          PY
          )"

          release_has_asset() {
            local release_json="$1"
            RELEASE_JSON="$release_json" ASSET_NAME="$bundle_name" python - <<'PY'
          import json
          import os
          import sys

          release = json.loads(os.environ['RELEASE_JSON'])
          target = os.environ['ASSET_NAME']
          sys.exit(0 if any(asset.get('name') == target for asset in release.get('assets', [])) else 1)
          PY
          }

          ensure_release_json() {
            local attempt=1
            local delay=15
            local release_json=''
            local output=''

            while true; do
              if release_json="$(api_get "$release_tag_url" 2>/dev/null)"; then
                printf '%s' "$release_json"
                return 0
              fi

              output="$(api_json POST "$release_api_url" "$create_payload" 2>&1)" || true

              if release_json="$(api_get "$release_tag_url" 2>/dev/null)"; then
                printf '%s' "$release_json"
                return 0
              fi

              if [ "$attempt" -ge 5 ]; then
                [ -n "$output" ] && printf '%s\n' "$output" >&2
                echo "Failed to create or fetch release after $attempt attempts." >&2
                return 1
              fi

              [ -n "$output" ] && printf '%s\n' "$output" >&2
              echo "Release create/fetch retry $attempt after ${delay}s." >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          upload_with_retry() {
            local upload_url="$1"
            local attempt=1
            local delay=15
            local release_json="$2"
            local output=''

            while true; do
              output="$(upload_asset_once "$bundle_path" "$upload_url" 2>&1)" && return 0

              if release_json="$(api_get "$release_tag_url" 2>/dev/null)" && release_has_asset "$release_json"; then
                echo "Bundle asset already exists after a failed upload response; continuing." >&2
                return 0
              fi

              if [ "$attempt" -ge 5 ]; then
                [ -n "$output" ] && printf '%s\n' "$output" >&2
                echo "Failed to upload $bundle_name after $attempt attempts." >&2
                return 1
              fi

              [ -n "$output" ] && printf '%s\n' "$output" >&2
              echo "Upload retry $attempt for $bundle_name after ${delay}s." >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          release_json="$(ensure_release_json)"
          if release_has_asset "$release_json"; then
            echo "Bundle asset already present on release ${GITHUB_REF_NAME}; skipping upload." >&2
            exit 0
          fi

          upload_url="$(RELEASE_JSON="$release_json" python - <<'PY'
          import json
          import os

          release = json.loads(os.environ['RELEASE_JSON'])
          print(release['upload_url'].split('{', 1)[0])
          PY
          )"

          upload_with_retry "$upload_url" "$release_json"

          final_release_json="$(api_get "$release_tag_url")"
          release_has_asset "$final_release_json"
