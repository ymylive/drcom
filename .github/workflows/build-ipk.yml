name: build-ipk

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '.github/workflows/build-ipk.yml'
      - 'jludrcom/**'
      - 'README.md'
  pull_request:
    paths:
      - '.github/workflows/build-ipk.yml'
      - 'jludrcom/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read

env:
  PACKAGE_NAME: jludrcom
  OPENWRT_RELEASE: 24.10.5

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Validate LuCI controller syntax
        run: npx --yes luaparse jludrcom/files/usr/lib/lua/luci/controller/jludrcom.lua > /dev/null

      - name: Validate LuCI inline script syntax
        run: |
          python - <<'PY'
          from pathlib import Path
          html = Path('jludrcom/files/usr/lib/lua/luci/view/jludrcom/form.htm').read_text(encoding='utf-8')
          marker = '<script type="text/javascript">'
          start = html.index(marker) + len(marker)
          end = html.index('</script>', start)
          Path('.tmp-luci-form.js').write_text(html[start:end], encoding='utf-8', newline='\n')
          PY
          node --check .tmp-luci-form.js

      - name: Run parser smoke test
        run: make -C jludrcom/src test-parser

  build:
    name: ${{ matrix.pkgarch }}
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        pkgarch:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_generic
          - arm_arm1176jzf-s_vfp
          - arm_cortex-a15_neon-vfpv4
          - arm_cortex-a5_vfpv4
          - arm_cortex-a7
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a8_vfpv3
          - arm_cortex-a9
          - arm_cortex-a9_neon
          - arm_cortex-a9_vfpv3-d16
          - arm_fa526
          - arm_xscale
          - i386_pentium4
          - loongarch64_generic
          - mips64_octeonplus
          - mips64el_mips64r2
          - mips_24kc
          - mips_mips32
          - mipsel_24kc
          - mipsel_mips32
          - powerpc_464fp
          - powerpc64_e5500
          - riscv64_riscv64
          - x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Build package
        uses: openwrt/gh-action-sdk@0c00b28c11bed5c7697e807d4cb8ef176ca688ef
        env:
          ARCH: ${{ matrix.pkgarch }}-${{ env.OPENWRT_RELEASE }}
          PACKAGES: ${{ env.PACKAGE_NAME }}
          NO_REFRESH_CHECK: true
          V: s

      - name: Collect build outputs
        shell: bash
        run: |
          set -eux
          mkdir -p dist/${{ matrix.pkgarch }}
          find bin/packages -type f \( -name '*.ipk' -o -name 'Packages' -o -name 'Packages.gz' -o -name 'Packages.manifest' \) -exec cp --parents {} dist/${{ matrix.pkgarch }}/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ matrix.pkgarch }}-openwrt-${{ env.OPENWRT_RELEASE }}
          path: dist/${{ matrix.pkgarch }}
          if-no-files-found: error
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist
          pattern: jludrcom-*-openwrt-*

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mapfile -t ipk_files < <(find dist -type f -name '*.ipk' | sort)
          if [ "${#ipk_files[@]}" -eq 0 ]; then
            echo 'No ipk files found to publish.' >&2
            exit 1
          fi

          bundle_path="dist/${PACKAGE_NAME}-openwrt-${OPENWRT_RELEASE}-all-arches.tar.gz"
          tar -czf "$bundle_path" "${ipk_files[@]}"
          sha256sum "$bundle_path" > dist/SHA256SUMS

          ensure_release_with_retry() {
            local attempt=1
            local delay=15
            local output=''

            while true; do
              output="$(gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes 2>&1)" && return 0

              if printf '%s' "$output" | grep -qi 'already exists'; then
                return 0
              fi

              if [ "$attempt" -ge 5 ]; then
                printf '%s\n' "$output" >&2
                echo "Failed to create release after $attempt attempts." >&2
                return 1
              fi

              printf '%s\n' "$output" >&2
              echo "Release creation retry $attempt after ${delay}s." >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          upload_with_retry() {
            local file="$1"
            local attempt=1
            local delay=15
            local output=''

            while true; do
              output="$(gh release upload "${GITHUB_REF_NAME}" "$file" --clobber 2>&1)" && return 0

              if [ "$attempt" -ge 5 ]; then
                printf '%s\n' "$output" >&2
                echo "Failed to upload $file after $attempt attempts." >&2
                return 1
              fi

              printf '%s\n' "$output" >&2
              echo "Upload retry $attempt for $file after ${delay}s." >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          ensure_release_with_retry

          echo 'Cooling down before release asset uploads to avoid secondary rate limits.' >&2
          sleep 300

          for file in "$bundle_path" dist/SHA256SUMS; do
            upload_with_retry "$file"
            sleep 15
          done
