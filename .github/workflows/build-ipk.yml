name: build-ipk

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '.github/workflows/build-ipk.yml'
      - 'jludrcom/**'
      - 'README.md'
  pull_request:
    paths:
      - '.github/workflows/build-ipk.yml'
      - 'jludrcom/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read

env:
  PACKAGE_NAME: jludrcom
  OPENWRT_RELEASE: 24.10.5

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Validate LuCI controller syntax
        run: npx --yes luaparse jludrcom/files/usr/lib/lua/luci/controller/jludrcom.lua > /dev/null

      - name: Validate LuCI inline script syntax
        run: |
          python - <<'PY'
          from pathlib import Path
          html = Path('jludrcom/files/usr/lib/lua/luci/view/jludrcom/form.htm').read_text(encoding='utf-8')
          marker = '<script type="text/javascript">'
          start = html.index(marker) + len(marker)
          end = html.index('</script>', start)
          Path('.tmp-luci-form.js').write_text(html[start:end], encoding='utf-8', newline='\n')
          PY
          node --check .tmp-luci-form.js

      - name: Run parser smoke test
        run: make -C jludrcom/src test-parser

  build:
    name: ${{ matrix.pkgarch }}
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        pkgarch:
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_generic
          - arm_arm1176jzf-s_vfp
          - arm_cortex-a15_neon-vfpv4
          - arm_cortex-a5_vfpv4
          - arm_cortex-a7
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a8_vfpv3
          - arm_cortex-a9
          - arm_cortex-a9_neon
          - arm_cortex-a9_vfpv3-d16
          - arm_fa526
          - arm_xscale
          - i386_pentium4
          - loongarch64_generic
          - mips64_octeonplus
          - mips64el_mips64r2
          - mips_24kc
          - mips_mips32
          - mipsel_24kc
          - mipsel_mips32
          - powerpc_464fp
          - powerpc64_e5500
          - riscv64_riscv64
          - x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Build package
        uses: openwrt/gh-action-sdk@0c00b28c11bed5c7697e807d4cb8ef176ca688ef
        env:
          ARCH: ${{ matrix.pkgarch }}-${{ env.OPENWRT_RELEASE }}
          PACKAGES: ${{ env.PACKAGE_NAME }}
          NO_REFRESH_CHECK: true
          V: s

      - name: Collect build outputs
        shell: bash
        run: |
          set -eux
          mkdir -p dist/${{ matrix.pkgarch }}
          find bin/packages -type f \( -name '*.ipk' -o -name 'Packages' -o -name 'Packages.gz' -o -name 'Packages.manifest' \) -exec cp --parents {} dist/${{ matrix.pkgarch }}/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ matrix.pkgarch }}-openwrt-${{ env.OPENWRT_RELEASE }}
          path: dist/${{ matrix.pkgarch }}
          if-no-files-found: error
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist
          pattern: jludrcom-*-openwrt-*

      - name: Publish release assets
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          generate_release_notes: true
          files: |
            dist/**/*.ipk